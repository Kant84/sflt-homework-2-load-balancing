global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000
    timeout client 50000
    timeout server 50000

frontend example1
    mode http
    bind :8088
    acl ACL_example1 hdr(host) -i example1.local
    use_backend backend1 if ACL_example1

frontend example2
    mode http
    bind :8089
    acl ACL_example2 hdr(host) -i example2.local
    use_backend backend2 if ACL_example2

backend backend1
    mode http
    balance roundrobin
    server s1 127.0.0.1:9001 check
    server s2 127.0.0.1:9002 check

backend backend2
    mode http
    balance roundrobin
    server s1 127.0.0.1:9003 check
    server s2 127.0.0.1:9004 check
